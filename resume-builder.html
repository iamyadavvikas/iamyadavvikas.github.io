<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder — Vikas Yadav</title>
  <style>
    /* ============================================================
       APP CHROME (screen only)
       ============================================================ */
    :root {
      --app-bg: #0e1220;
      --app-panel: #171c2e;
      --app-panel-2: #1f2540;
      --app-border: #2c3357;
      --app-text: #e6e9f5;
      --app-muted: #9aa3c4;
      --app-accent: #2dd4bf;
      --app-accent-2: #38bdf8;
      --app-danger: #f87171;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--app-bg);
      color: var(--app-text);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 16px;
      background: rgba(14, 18, 32, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--app-border);
    }
    .toolbar .brand {
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-right: auto;
      font-size: 14px;
    }
    .toolbar .brand span {
      background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 60%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--app-text);
      background: var(--app-panel-2);
      border: 1px solid var(--app-border);
      border-radius: 8px;
      padding: 7px 13px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.05s, background 0.15s;
    }
    .btn:hover { border-color: var(--app-accent); }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 100%);
      color: #06121a;
      border: none;
    }
    .btn.danger:hover { border-color: var(--app-danger); color: var(--app-danger); }
    .saved-pill {
      font-size: 11px;
      color: var(--app-muted);
      min-width: 64px;
    }
    .fit-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--app-border);
      white-space: nowrap;
    }
    .fit-pill.ok { color: #2dd4bf; border-color: rgba(45,212,191,0.4); background: rgba(45,212,191,0.08); }
    .fit-pill.warn { color: #f87171; border-color: rgba(248,113,113,0.45); background: rgba(248,113,113,0.1); }

    /* ----- ATS / writing analysis ----- */
    .ats-pill {
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--app-border);
      white-space: nowrap;
    }
    .ats-pill.good { color: #34d399; border-color: rgba(52,211,153,0.45); background: rgba(52,211,153,0.1); }
    .ats-pill.mid  { color: #fbbf24; border-color: rgba(251,191,36,0.45); background: rgba(251,191,36,0.1); }
    .ats-pill.low  { color: #f87171; border-color: rgba(248,113,113,0.45); background: rgba(248,113,113,0.1); }

    .analysis-panel {
      position: fixed;
      top: 53px;
      right: 0;
      width: 380px;
      max-width: 92vw;
      height: calc(100vh - 53px);
      background: var(--app-panel);
      border-left: 1px solid var(--app-border);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 40;
      padding: 16px 16px 60px;
      box-shadow: -16px 0 40px rgba(0,0,0,0.35);
    }
    body.show-analysis .analysis-panel { transform: none; }
    .analysis-panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--app-accent);
      margin: 18px 0 8px;
    }
    .analysis-panel h3:first-of-type { margin-top: 0; }
    .ap-close {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 18px;
      line-height: 1;
      color: var(--app-muted);
      background: none;
      border: none;
      cursor: pointer;
    }
    .ap-close:hover { color: var(--app-text); }

    .score-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--app-panel-2);
      border: 1px solid var(--app-border);
      border-radius: 12px;
      padding: 14px;
    }
    .score-num { font-size: 30px; font-weight: 800; line-height: 1; white-space: nowrap; }
    .score-num small { font-size: 13px; font-weight: 600; color: var(--app-muted); }
    .score-meta { font-size: 11px; color: var(--app-muted); flex: 1; }
    .score-bar { height: 6px; border-radius: 999px; background: var(--app-border); margin-top: 7px; overflow: hidden; }
    .score-bar > i { display: block; height: 100%; border-radius: 999px; }
    .s-good { color: #34d399; } .bg-good { background: #34d399; }
    .s-mid  { color: #fbbf24; } .bg-mid  { background: #fbbf24; }
    .s-low  { color: #f87171; } .bg-low  { background: #f87171; }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .check-row .ck { flex: 0 0 16px; font-weight: 700; text-align: center; }
    .check-row .ck.pass { color: #34d399; }
    .check-row .ck.fail { color: #f87171; }
    .check-row .ck.warn { color: #fbbf24; }
    .check-row .ck-detail { color: var(--app-muted); font-size: 11px; }

    .issue {
      border-left: 3px solid var(--app-border);
      padding: 7px 10px;
      margin-bottom: 7px;
      background: var(--app-panel-2);
      border-radius: 0 8px 8px 0;
      font-size: 12px;
    }
    .issue.error { border-left-color: #f87171; }
    .issue.warn  { border-left-color: #fbbf24; }
    .issue.info  { border-left-color: #60a5fa; }
    .issue .where { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--app-muted); }
    .issue .msg { margin-top: 2px; color: var(--app-text); }
    .issue .quote { color: var(--app-muted); font-style: italic; margin-top: 2px; }
    .issue .sug { margin-top: 3px; }
    .issue .sug b { color: #34d399; }

    .verb-cat { margin-bottom: 8px; }
    .verb-cat .vc-title { font-size: 11px; font-weight: 700; color: var(--app-text); margin-bottom: 4px; }
    .chip {
      display: inline-block;
      font-size: 11px;
      color: var(--app-muted);
      background: var(--app-panel-2);
      border: 1px solid var(--app-border);
      border-radius: 6px;
      padding: 2px 7px;
      margin: 0 4px 4px 0;
    }
    .empty-good { font-size: 12px; color: #34d399; padding: 6px 0; }
    .ap-note { font-size: 11px; color: var(--app-muted); line-height: 1.5; margin: 2px 0 6px; }

    @media print { .analysis-panel { display: none !important; } }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 460px) 1fr;
      gap: 0;
      height: calc(100vh - 53px);
    }

    /* ----- Form pane ----- */
    .form-pane {
      overflow-y: auto;
      padding: 18px 18px 80px;
      border-right: 1px solid var(--app-border);
      background: var(--app-bg);
    }
    .group {
      background: var(--app-panel);
      border: 1px solid var(--app-border);
      border-radius: 12px;
      padding: 14px 14px 16px;
      margin-bottom: 16px;
    }
    .group > h3 {
      margin: 0 0 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--app-accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .group > h3 .chevron {
      font-size: 11px;
      color: var(--app-muted);
      transition: transform 0.15s;
    }
    .group.collapsed > h3 { margin-bottom: 0; }
    .group.collapsed > h3 .chevron { transform: rotate(-90deg); }
    .group.collapsed .group-body { display: none; }
    .field { margin-bottom: 11px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--app-muted);
      margin-bottom: 4px;
    }
    .field input[type="text"],
    .field textarea {
      width: 100%;
      font: inherit;
      font-size: 13px;
      color: var(--app-text);
      background: var(--app-panel-2);
      border: 1px solid var(--app-border);
      border-radius: 8px;
      padding: 8px 10px;
      resize: vertical;
    }
    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--app-accent);
    }
    .field textarea { min-height: 60px; line-height: 1.45; }

    .item {
      background: var(--app-panel-2);
      border: 1px solid var(--app-border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .item-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .item-head .item-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--app-muted);
      margin-right: auto;
    }
    .icon-btn {
      font: inherit;
      font-size: 12px;
      line-height: 1;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--app-muted);
      background: var(--app-panel);
      border: 1px solid var(--app-border);
      border-radius: 7px;
      cursor: pointer;
    }
    .icon-btn:hover { color: var(--app-text); border-color: var(--app-accent); }
    .icon-btn.del:hover { color: var(--app-danger); border-color: var(--app-danger); }
    .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .add-btn {
      width: 100%;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--app-accent);
      background: transparent;
      border: 1px dashed var(--app-border);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
    }
    .add-btn:hover { border-color: var(--app-accent); background: rgba(45, 212, 191, 0.06); }

    .bullets { margin-top: 8px; }
    .bullet-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 6px;
    }
    .bullet-row textarea {
      flex: 1;
      min-height: 44px;
    }
    .bullet-row .bullet-ctrls {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hint {
      font-size: 10.5px;
      color: var(--app-muted);
      margin-top: 4px;
      line-height: 1.4;
    }
    .hint code {
      background: var(--app-panel-2);
      padding: 1px 4px;
      border-radius: 4px;
      color: var(--app-accent);
    }

    /* ----- Preview pane ----- */
    .preview-pane {
      overflow-y: auto;
      padding: 28px;
      background: #555a66;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .page {
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      padding: 9mm 11mm;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      position: relative;
    }
    .page-guide {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed rgba(220, 38, 38, 0.5);
      pointer-events: none;
      z-index: 2;
    }
    .page-guide span {
      position: absolute;
      right: 6px;
      top: -8px;
      font-size: 8px;
      font-weight: 600;
      color: #dc2626;
      background: #fff;
      padding: 0 4px;
      font-family: "Inter", system-ui, sans-serif;
      letter-spacing: 0.4px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .form-pane { border-right: none; border-bottom: 1px solid var(--app-border); max-height: 65vh; }
      .preview-pane { overflow-x: auto; padding: 16px; }
    }

    /* ============================================================
       RESUME PREVIEW STYLES (mirror of resume.html print CSS)
       Scoped under .resume so app chrome is unaffected.
       ============================================================ */
    .resume {
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      font-size: 11px;
      line-height: 1.25;
    }
    .resume * { box-sizing: border-box; margin: 0; padding: 0; }
    .resume header { text-align: center; margin-bottom: 6px; }
    .resume .name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 2px;
      color: #000;
    }
    .resume .title {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .resume .contact {
      font-size: 11px;
      color: #000;
      line-height: 1.4;
    }
    .resume .contact a { color: #000; text-decoration: none; }
    .resume .contact span { white-space: nowrap; }
    .resume .sep { color: #000; margin: 0 4px; }
    .resume section { margin-top: 7px; }
    .resume h2 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #000;
      border-bottom: 1.5px solid #000;
      padding-bottom: 1px;
      margin-bottom: 3px;
    }
    .resume p.summary { font-size: 11px; color: #000; margin-bottom: 3px; text-align: left; }
    .resume .skills p { font-size: 10.5px; color: #000; margin-bottom: 2px; }
    .resume .skills strong { font-weight: 700; color: #000; }
    .resume .job-title-line { font-size: 11px; font-weight: 700; color: #000; margin-bottom: 1px; }
    .resume .job-company-line { font-size: 10.5px; font-style: italic; color: #000; margin-bottom: 3px; }
    .resume ul { list-style: disc; margin: 0 0 3px; padding-left: 16px; }
    .resume li { font-size: 10.5px; margin-bottom: 2px; color: #000; }
    .resume li strong { color: #000; font-weight: 700; }
    .resume .edu-line { font-size: 11px; color: #000; margin-bottom: 3px; }
    .resume .edu-line strong { font-weight: 700; }

    /* ============================================================
       PRINT — only the resume, at A4, app chrome hidden
       ============================================================ */
    @page { size: A4; margin: 0; }
    @media print {
      html, body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        background: #fff !important;
        height: auto !important;
      }
      .toolbar, .form-pane, .preview-pane { display: block; }
      .toolbar, .form-pane { display: none !important; }
      .layout { display: block; height: auto; }
      .preview-pane {
        overflow: visible;
        padding: 0;
        background: #fff;
        display: block;
      }
      .page {
        width: auto;
        min-height: 0;
        padding: 7mm 9mm;
        background: #fff;
        box-shadow: none;
      }
      .page-guide { display: none !important; }
      .resume section { page-break-inside: avoid; }
      .resume li, .resume .job-head { page-break-inside: avoid; }
    }
  </style>
</head>

      { title: "Cloud Cost Optimisation:", body: "Decommissioning stale ASGs, Launch Templates, and dead resources; Jenkins Job DSL teardown-as-code for S3 and SSM; and the media image-recompression pipeline (raw → recompressed in S3) for ongoing storage savings. All shipped as reviewed, reversible PRs." },
      { title: "Observability & Incident Response:", body: "Built and run Splunk. Own VividCortex database monitoring (slow-query and query-plan analysis on RDS). Use SignalFX, RUM, APM, and synthetics across the photo-upload and CreateMedia KPIs. Fast revert PRs are the main rollback during incidents." }
    ],
    education: [
      { degree: "**Master of Technology (M.Tech)** — Indian Institute of Technology Kharagpur (IIT Kharagpur)", date: "2020 – 2022" },
      { degree: "**Bachelor of Technology (B.Tech)** — University of Petroleum and Energy Studies (UPES), Dehradun, India", date: "2015 – 2019" }
    ]
  };

  const STORAGE_KEY = "resumeData";
  const COLLAPSE_KEY = "resumeCollapse";

  let collapseState = {};
  try { collapseState = JSON.parse(localStorage.getItem(COLLAPSE_KEY)) || {}; } catch (e) { collapseState = {}; }

  /* ============================================================
     STATE
     ============================================================ */
  let data = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return migrate(JSON.parse(raw));
    } catch (e) { /* ignore corrupt storage */ }
    return clone(DEFAULT_DATA);
  }

  function migrate(d) {
    // Ensure all top-level keys exist so older saves don't break the UI.
    const base = clone(DEFAULT_DATA);
    return Object.assign(base, d);
  }

  function clone(o) { return JSON.parse(JSON.stringify(o)); }

  let saveTimer = null;
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        flashSaved();
      } catch (e) { /* storage full / disabled */ }
    }, 250);
  }

  function flashSaved() {
    const pill = document.getElementById("savedPill");
    const t = new Date();
    pill.textContent = "Saved " + t.toLocaleTimeString();
  }

  /* ============================================================
     HELPERS
     ============================================================ */
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  // **bold** -> <strong>, after escaping. No other HTML allowed (XSS-safe).
  function fmt(s) {
    return escapeHtml(s).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  }

  function el(tag, attrs, children) {
    const node = document.createElement(tag);
    if (attrs) for (const k in attrs) {
      if (k === "class") node.className = attrs[k];
      else if (k === "html") node.innerHTML = attrs[k];
      else if (k === "text") node.textContent = attrs[k];
      else if (k.startsWith("on") && typeof attrs[k] === "function") node.addEventListener(k.slice(2), attrs[k]);
      else if (attrs[k] === true) node.setAttribute(k, "");
      else if (attrs[k] !== false && attrs[k] != null) node.setAttribute(k, attrs[k]);
    }
    if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return node;
  }

  /* ============================================================
     PREVIEW RENDER
     ============================================================ */
  function renderPreview() {
    const r = document.getElementById("resume");
    const parts = [];

    // Header
    let contactHtml = "";
    data.contacts.forEach((c, i) => {
      const inner = c.href
        ? '<a href="' + escapeHtml(c.href) + '">' + escapeHtml(c.text) + "</a>"
        : escapeHtml(c.text);
      contactHtml += "<span>" + inner + "</span>";
      const isLast = i === data.contacts.length - 1;
      if (c.break) contactHtml += "<br />\n";
      else if (!isLast) contactHtml += ' <span class="sep">·</span> ';
    });

    parts.push(
      '<header>' +
        '<div class="name">' + escapeHtml(data.name) + "</div>" +
        '<div class="title">' + escapeHtml(data.title) + "</div>" +
        '<div class="contact">' + contactHtml + "</div>" +
      "</header>"
    );

    // Summary (blank lines split into separate paragraphs)
    let sumHtml = "<section><h2>Summary</h2>";
    String(data.summary).split(/\n\s*\n/).forEach(para => {
      const t = para.trim();
      if (t) sumHtml += '<p class="summary">' + fmt(t) + "</p>";
    });
    sumHtml += "</section>";
    parts.push(sumHtml);

    // Skills
    let skillsHtml = '<section><h2>Skills</h2><div class="skills">';
    data.skills.forEach(s => {
      const k = String(s.k || "").trim().replace(/:$/, "");
      skillsHtml += "<p><strong>" + fmt(k) + ":</strong> " + fmt(s.v) + "</p>";
    });
    skillsHtml += "</div></section>";
    parts.push(skillsHtml);

    // Experience
    let expHtml = "<section><h2>Experience</h2>";
    data.experience.forEach(job => {
      const dateStr = job.date ? " | " + escapeHtml(job.date) : "";
      expHtml +=
        '<p class="job-title-line">' + fmt(job.title) + dateStr + "</p>" +
        '<p class="job-company-line">' + fmt(job.org) + "</p><ul>";
      job.bullets.forEach(b => { expHtml += "<li>" + fmt(b) + "</li>"; });
      expHtml += "</ul>";
    });
    expHtml += "</section>";
    parts.push(expHtml);

    // Projects
    let projHtml = '<section><h2>Key Projects</h2><ul>';
    data.projects.forEach(p => {
      projHtml += "<li><strong>" + fmt(p.title) + "</strong> " + fmt(p.body) + "</li>";
    });
    projHtml += "</ul></section>";
    parts.push(projHtml);

    // Education
    let eduHtml = "<section><h2>Education</h2>";
    data.education.forEach(e => {
      const dateStr = e.date ? " | " + escapeHtml(e.date) : "";
      eduHtml += '<p class="edu-line">' + fmt(e.degree) + dateStr + "</p>";
    });
    eduHtml += "</section>";
    parts.push(eduHtml);

    r.innerHTML = parts.join("");
    requestAnimationFrame(() => { updatePageFit(); renderAnalysis(); });
  }

  /* ============================================================
     PAGE-FIT MEASUREMENT + PAGE-BREAK GUIDES
     ============================================================ */
  let lastPageCount = 1;
  const PX_PER_MM = 96 / 25.4;
  const USABLE_MM = 297 - 11 - 11;       // A4 height minus top+bottom margins
  const USABLE_PX = USABLE_MM * PX_PER_MM;
  const PAD_TOP_PX = 11 * PX_PER_MM;

  function updatePageFit() {
    const resume = document.getElementById("resume");
    const page = document.getElementById("page");
    const pill = document.getElementById("fitPill");
    if (!resume || !page || !pill) return;

    const h = resume.offsetHeight;
    const pages = Math.max(1, Math.ceil(h / USABLE_PX - 0.002));
    lastPageCount = pages;

    pill.classList.remove("ok", "warn");
    if (pages <= 2) {
      pill.classList.add("ok");
      pill.textContent = pages === 1 ? "\u2713 Fits 1 page" : "\u2713 Fits 2 pages";
    } else {
      pill.classList.add("warn");
      pill.textContent = "\u26A0 " + pages + " pages \u2014 trim to fit";
    }

    // Redraw page-break guide lines inside the preview page.
    page.querySelectorAll(".page-guide").forEach(g => g.remove());
    for (let n = 1; n < pages; n++) {
      const guide = el("div", { class: "page-guide" }, [
        el("span", { text: "page " + n + " / " + (n + 1) })
      ]);
      guide.style.top = (PAD_TOP_PX + n * USABLE_PX) + "px";
      page.appendChild(guide);
    }
  }

  /* ============================================================
     FORM BUILDERS
     ============================================================ */
  function update(path, value) {
    // path is array, e.g. ["experience", 0, "bullets", 2]
    let o = data;
    for (let i = 0; i < path.length - 1; i++) o = o[path[i]];
    o[path[path.length - 1]] = value;
    save();
    renderPreview();
  }

  function move(arr, from, to) {
    if (to < 0 || to >= arr.length) return;
    const [x] = arr.splice(from, 1);
    arr.splice(to, 0, x);
  }

  function dup(arr, i) { arr.splice(i + 1, 0, clone(arr[i])); }

  function makeGroup(title) {
    const body = el("div", { class: "group-body" });
    const chevron = el("span", { class: "chevron", html: "&#9662;" });
    const h3 = el("h3", {}, [el("span", { text: title }), chevron]);
    const collapsed = collapseState[title] === true;
    const group = el("div", { class: "group" + (collapsed ? " collapsed" : "") }, [h3, body]);
    h3.addEventListener("click", () => {
      const isCol = group.classList.toggle("collapsed");
      collapseState[title] = isCol;
      try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapseState)); } catch (e) { /* ignore */ }
    });
    return { group, body };
  }

  function textField(label, value, oninput, multiline) {
    const input = multiline
      ? el("textarea", { rows: 3 })
      : el("input", { type: "text" });
    input.value = value || "";
    input.addEventListener("input", () => oninput(input.value));
    return el("div", { class: "field" }, [el("label", { text: label }), input]);
  }

  function ctrlBtns(idx, len, onUp, onDown, onDel, onDup) {
    const btns = [
      el("button", { class: "icon-btn", title: "Move up", disabled: idx === 0, onclick: onUp, html: "&#9650;" }),
      el("button", { class: "icon-btn", title: "Move down", disabled: idx === len - 1, onclick: onDown, html: "&#9660;" })
    ];
    if (onDup) btns.push(el("button", { class: "icon-btn", title: "Duplicate", onclick: onDup, html: "&#10697;" }));
    btns.push(el("button", { class: "icon-btn del", title: "Remove", onclick: onDel, html: "&times;" }));
    return btns;
  }

  function renderForm() {
    const pane = document.getElementById("formPane");
    pane.innerHTML = "";

    /* ---- Header group ---- */
    const hg = makeGroup("Header");
    hg.body.appendChild(textField("Full name", data.name, v => update(["name"], v)));

      ]);

      ]));
      item.appendChild(textField("Job title", job.title, v => update(["experience", i, "title"], v)));

      // bullets
      const bWrap = el("div", { class: "bullets" });

          () => { move(job.bullets, j, j - 1); save(); renderForm(); renderPreview(); },

    eg.body.appendChild(el("button", {

  /* ============================================================
     ATS & WRITING ANALYSIS (offline, heuristic)
     ============================================================ */
  const ACTION_VERBS = {
    "Leadership": ["Led","Directed","Spearheaded","Orchestrated","Coordinated","Oversaw","Mentored","Drove","Championed"],
    "Built / Engineered": ["Built","Architected","Engineered","Developed","Designed","Implemented","Deployed","Automated","Configured","Provisioned","Programmed"],
    "Improved": ["Optimized","Improved","Increased","Reduced","Accelerated","Streamlined","Enhanced","Consolidated","Refactored","Hardened","Scaled"],
    "Ownership": ["Owned","Managed","Administered","Operated","Maintained","Governed","Standardized"],
    "Analysis": ["Analyzed","Diagnosed","Investigated","Evaluated","Audited","Identified","Resolved","Troubleshot"],
    "Delivery": ["Delivered","Shipped","Launched","Executed","Completed","Migrated","Decommissioned"],
    "Impact": ["Achieved","Saved","Cut","Eliminated","Prevented","Secured","Generated"]
  };

  const STRONG_VERBS = new Set();
  Object.values(ACTION_VERBS).forEach(arr => arr.forEach(v => STRONG_VERBS.add(v.toLowerCase())));
  ["own","build","architect","engineer","develop","design","implement","deploy","automate","configure","provision","program","optimize","improve","increase","reduce","accelerate","streamline","enhance","consolidate","refactor","harden","scale","manage","administer","operate","maintain","govern","standardize","analyze","diagnose","investigate","evaluate","audit","identify","resolve","troubleshoot","deliver","ship","launch","execute","migrate","decommission","lead","drive","run","support","create","produce","achieve","save","cut","eliminate","prevent","secure","generate","spearhead","orchestrate","coordinate","mentor","oversee","direct","partner","collaborate","negotiate","present","authored","wrote","write","ran"].forEach(v => STRONG_VERBS.add(v));

  const WEAK_STARTS = [
    { re: /^responsible for\b/i, sug: ["Owned","Led","Managed","Directed"] },
    { re: /^worked on\b/i,       sug: ["Built","Developed","Engineered","Delivered"] },
    { re: /^worked with\b/i,     sug: ["Partnered with","Collaborated with","Leveraged"] },
    { re: /^helped to\b|^helped\b/i, sug: ["Enabled","Accelerated","Drove","Supported"] },
    { re: /^assisted (with|in)\b|^assisted\b/i, sug: ["Supported","Facilitated","Partnered on"] },
    { re: /^handled\b/i,         sug: ["Managed","Resolved","Administered","Operated"] },
    { re: /^involved in\b/i,     sug: ["Drove","Led","Contributed to"] },
    { re: /^in charge of\b/i,    sug: ["Led","Owned","Directed"] },
    { re: /^tasked with\b/i,     sug: ["Led","Owned","Executed"] },
    { re: /^duties includ(ed|e)\b/i, sug: ["Led","Delivered","Managed"] },
    { re: /^made\b/i,            sug: ["Built","Created","Engineered","Produced"] },
    { re: /^did\b/i,             sug: ["Executed","Performed","Delivered"] },
    { re: /^used\b/i,            sug: ["Leveraged","Applied","Utilized"] },
    { re: /^utilized\b/i,        sug: ["Applied","Leveraged","Used"] },
    { re: /^got\b/i,             sug: ["Achieved","Secured","Obtained"] },
    { re: /^participated in\b/i, sug: ["Contributed to","Drove","Led"] }
  ];

  const FILLER = ["very","really","extremely","various","a lot of","things","stuff","synergy","go-getter","team player","results-driven","hard-working","detail-oriented","self-starter","think outside the box"];
  const MISSPELL = { "teh":"the","recieve":"receive","occured":"occurred","seperate":"separate","definately":"definitely","enviroment":"environment","wich":"which","alot":"a lot","sucessful":"successful","accross":"across","mantain":"maintain","existance":"existence","priviledge":"privilege","responsibilty":"responsibility","experiance":"experience" };

  function stripMd(s) { return String(s).replace(/\*\*/g, "").trim(); }

  function analyzeText(where, raw, opts) {
    opts = opts || {};
    const issues = [];
    const text = stripMd(raw);
    if (!text) return issues;
    const lower = text.toLowerCase();

    const fp = text.match(/\b(I|I'm|I've|I'll|me|my|mine|we|we're|our|ours|us)\b/g);
    if (fp && fp.length) {
      issues.push({ where, sev: "error", msg: "Uses first-person pronouns (" + [...new Set(fp)].slice(0,4).join(", ") + "). Resumes are written without I/we/my.", quote: text });
    }

    if (opts.bullet) {
      let matched = false;
      for (const w of WEAK_STARTS) {
        if (w.re.test(text)) {
          issues.push({ where, sev: "error", msg: "Weak opener \u2014 start with a strong action verb.", quote: text, sug: w.sug });
          matched = true; break;
        }
      }
      if (!matched) {
        const firstRaw = text.split(/\s+/)[0] || "";
        const first = firstRaw.replace(/[^A-Za-z'-]/g, "").toLowerCase();
        if (first && !STRONG_VERBS.has(first)) {
          issues.push({ where, sev: "info", msg: "May not start with an action verb (\u201C" + firstRaw + "\u201D).", quote: text, sug: ["Led","Built","Improved","Delivered"] });
        }
      }
      if (!/\d/.test(text)) {
        issues.push({ where, sev: "warn", msg: "No number/metric \u2014 quantify the impact (%, count, time, $).", quote: text });
      }
    }

    if (/\b(was|were|been|being|is|are|be)\s+(\w+ed|built|made|done|written|driven|given|taken|seen|known|shown|run|held|sent|kept|led)\b/i.test(text)) {
      issues.push({ where, sev: "warn", msg: "Possible passive voice \u2014 prefer active voice.", quote: text });
    }

    const found = FILLER.filter(f => new RegExp("\\b" + f.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "i").test(lower));
    if (found.length) {
      issues.push({ where, sev: "info", msg: "Filler/buzzword: " + found.slice(0,3).join(", ") + " \u2014 cut or replace with specifics.", quote: text });
    }

    const misses = Object.keys(MISSPELL).filter(m => new RegExp("\\b" + m + "\\b", "i").test(lower));
    if (misses.length) {
      issues.push({ where, sev: "error", msg: "Likely misspelling: " + misses.map(m => m + " \u2192 " + MISSPELL[m]).join(", "), quote: text });
    }

    if (/ {2,}/.test(raw)) issues.push({ where, sev: "info", msg: "Double space \u2014 collapse to one.", quote: text });
    if (/\s[,.;:]/.test(text)) issues.push({ where, sev: "info", msg: "Space before punctuation.", quote: text });

    const rep = text.match(/\b(\w+)\s+\1\b/i);
    if (rep) issues.push({ where, sev: "warn", msg: "Repeated word: \u201C" + rep[1] + "\u201D.", quote: text });

    text.split(/(?<=[.!?])\s+/).forEach(sent => {
      const wc = sent.trim().split(/\s+/).filter(Boolean).length;
      if (wc > 40) issues.push({ where, sev: "info", msg: "Long sentence (" + wc + " words) \u2014 consider splitting.", quote: sent.trim() });
    });

    return issues;
  }

  function analyze() {
    const issues = [];
    let bulletTotal = 0, bulletWithNum = 0, bulletStrong = 0, firstPerson = 0;

    analyzeText("Summary", data.summary, {}).forEach(i => { issues.push(i); if (i.msg.indexOf("first-person") >= 0) firstPerson++; });

    data.skills.forEach((sk, i) => {
      analyzeText("Skill: " + (sk.k || ("row " + (i+1))), sk.v, {}).forEach(x => issues.push(x));
    });

    data.experience.forEach((job, i) => {
      (job.bullets || []).forEach((b, j) => {
        const where = "Role " + (i+1) + " \u00B7 Bullet " + (j+1);
        const t = stripMd(b);
        if (t) {
          bulletTotal++;
          if (/\d/.test(t)) bulletWithNum++;
          const first = (t.split(/\s+/)[0] || "").replace(/[^A-Za-z'-]/g, "").toLowerCase();
          const weak = WEAK_STARTS.some(w => w.re.test(t));
          if (!weak && STRONG_VERBS.has(first)) bulletStrong++;
        }
        analyzeText(where, b, { bullet: true }).forEach(x => { issues.push(x); if (x.msg.indexOf("first-person") >= 0) firstPerson++; });
      });
    });

    data.projects.forEach((p, i) => {
      analyzeText("Project " + (i+1), (p.title || "") + " " + (p.body || ""), {}).forEach(x => issues.push(x));
    });

    const emailOk = data.contacts.some(c => /@/.test(c.text) || /^mailto:/i.test(c.href || ""));
    const phoneOk = data.contacts.some(c => /\+?\d[\d\s\-()]{7,}/.test(c.text));
    const locOk   = data.contacts.some(c => /,|india|remote|bangalore|hyderabad|pune|noida|delhi|mumbai/i.test(c.text));
    const linkOk  = data.contacts.some(c => /linkedin|github|gitlab|portfolio|http/i.test((c.href || "") + " " + c.text));
    const wordCount = (JSON.stringify([data.summary, data.skills, data.experience, data.projects]).match(/[A-Za-z][A-Za-z'-]+/g) || []).length;

    const quantRatio = bulletTotal ? bulletWithNum / bulletTotal : 0;
    const strongRatio = bulletTotal ? bulletStrong / bulletTotal : 0;

    const checks = [
      { label: "Email present", pass: emailOk },
      { label: "Phone present", pass: phoneOk },
      { label: "Location present", pass: locOk },
      { label: "LinkedIn / GitHub link", pass: linkOk },
      { label: "Summary written", pass: !!stripMd(data.summary) },
      { label: "At least 4 skill rows", pass: data.skills.length >= 4 },
      { label: "Experience with bullets", pass: data.experience.some(j => (j.bullets||[]).some(b => stripMd(b))) },
      { label: "Education present", pass: data.education.length >= 1 },
      { label: "Fits 1\u20132 pages", pass: lastPageCount <= 2, detail: lastPageCount + " page(s)" },
      { label: "Reasonable length", pass: wordCount >= 350 && wordCount <= 900, detail: wordCount + " words" },
      { label: "Most bullets quantified", pass: quantRatio >= 0.5, detail: Math.round(quantRatio*100) + "% have a number" },
      { label: "No first-person pronouns", pass: firstPerson === 0, detail: firstPerson ? (firstPerson + " found") : "" },
      { label: "Strong action-verb openers", pass: strongRatio >= 0.7, detail: Math.round(strongRatio*100) + "% strong" },
      { label: "Standard section headings", pass: true }
    ];

    let score = 0;
    score += (emailOk?5:0) + (phoneOk?4:0) + (locOk?3:0) + (linkOk?3:0);
    score += (checks[4].pass?4:0)+(checks[5].pass?4:0)+(checks[6].pass?4:0)+(checks[7].pass?3:0);
    score += (lastPageCount<=2?10:0);
    score += (checks[9].pass?5:0);
    score += Math.round(quantRatio*20);
    score += (firstPerson===0?15:Math.max(0,15-firstPerson*3));
    score += Math.round(strongRatio*15);
    const errCount = issues.filter(i => i.sev==="error").length;
    score += Math.max(0, 5 - Math.min(5, errCount));
    score = Math.max(0, Math.min(100, Math.round(score)));

    return { score, checks, issues };
  }

  function renderAnalysis() {
    const panel = document.getElementById("analysisPanel");
    const pill = document.getElementById("atsPill");
    if (!panel) return;
    const a = analyze();

    if (pill) {
      pill.classList.remove("good","mid","low");
      pill.classList.add(a.score >= 80 ? "good" : a.score >= 60 ? "mid" : "low");
      pill.textContent = "ATS " + a.score;
    }
    if (!document.body.classList.contains("show-analysis")) return;

    const tier = a.score >= 80 ? "good" : a.score >= 60 ? "mid" : "low";
    const tierWord = a.score >= 80 ? "Strong" : a.score >= 60 ? "Needs work" : "Weak";

    let html = '<button class="ap-close" id="apClose" title="Close">\u00D7</button>';
    html += '<h3>ATS Score</h3>';
    html += '<div class="score-card"><div class="score-num s-' + tier + '">' + a.score + '<small>/100</small></div>' +
            '<div class="score-meta"><b class="s-' + tier + '">' + tierWord + '</b>' +
            '<div class="score-bar"><i class="bg-' + tier + '" style="width:' + a.score + '%"></i></div>' +
            'Single column, standard fonts, real text \u2014 no tables, images or icons.</div></div>';

    html += '<h3>Checklist</h3>';
    a.checks.forEach(c => {
      const soft = (c.label.indexOf("first-person")>=0 || c.label.indexOf("quantified")>=0 || c.label.indexOf("action-verb")>=0 || c.label.indexOf("length")>=0 || c.label.indexOf("pages")>=0);
      const cls = c.pass ? "pass" : (soft ? "warn" : "fail");
      const mark = c.pass ? "\u2713" : (cls === "warn" ? "\u26A0" : "\u2717");
      html += '<div class="check-row"><span class="ck ' + cls + '">' + mark + '</span>' +
              '<span>' + escapeHtml(c.label) + (c.detail ? ' <span class="ck-detail">(' + escapeHtml(c.detail) + ')</span>' : '') + '</span></div>';
    });

    const order = { error: 0, warn: 1, info: 2 };
    const sorted = a.issues.slice().sort((x,y) => order[x.sev] - order[y.sev]);
    html += '<h3>Writing Suggestions (' + sorted.length + ')</h3>';
    if (!sorted.length) {
      html += '<div class="empty-good">\u2713 No writing issues detected.</div>';
    } else {
      sorted.forEach(it => {
        html += '<div class="issue ' + it.sev + '"><div class="where">' + escapeHtml(it.where) + '</div>' +
                '<div class="msg">' + escapeHtml(it.msg) + '</div>';
        if (it.quote) html += '<div class="quote">\u201C' + escapeHtml(it.quote.length > 110 ? it.quote.slice(0,110) + "\u2026" : it.quote) + '\u201D</div>';
        if (it.sug) html += '<div class="sug">Try: <b>' + it.sug.map(escapeHtml).join("</b>, <b>") + '</b></div>';
        html += '</div>';
      });
    }

    html += '<h3>Action Verb Library</h3>';
    html += '<div class="ap-note">Open every bullet with one of these, matched to the result.</div>';
    Object.keys(ACTION_VERBS).forEach(cat => {
      html += '<div class="verb-cat"><div class="vc-title">' + escapeHtml(cat) + '</div>';
      html += ACTION_VERBS[cat].map(v => '<span class="chip">' + escapeHtml(v) + '</span>').join("");
      html += '</div>';
    });

    panel.innerHTML = html;
    const close = document.getElementById("apClose");
    if (close) close.addEventListener("click", () => document.body.classList.remove("show-analysis"));
  }

  /* ============================================================
     TOOLBAR ACTIONS
     ============================================================ */
  document.getElementById("btnExport").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = el("a", { href: url, download: "resume-data.json" });
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  document.getElementById("btnImport").addEventListener("click", () => {
    document.getElementById("fileInput").click();
  });
  document.getElementById("fileInput").addEventListener("change", (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== "object") throw new Error("not an object");
        data = migrate(parsed);
        save();
        renderForm();
        renderPreview();
      } catch (e) {
        alert("Could not import: the file is not valid resume JSON.");
      }
      ev.target.value = "";
    };
    reader.readAsText(file);
  });

  document.getElementById("btnReset").addEventListener("click", () => {
    if (confirm("Reset to the default resume? This clears your saved edits in this browser.")) {
      data = clone(DEFAULT_DATA);
      save();
      renderForm();
      renderPreview();
    }
  });

  document.getElementById("btnPrint").addEventListener("click", () => window.print());

  function toggleAnalysis(force) {
    const show = typeof force === "boolean" ? force : !document.body.classList.contains("show-analysis");
    document.body.classList.toggle("show-analysis", show);
    if (show) renderAnalysis();
  }
  document.getElementById("btnAnalysis").addEventListener("click", () => toggleAnalysis());
  document.getElementById("atsPill").addEventListener("click", () => toggleAnalysis(true));

  /* ============================================================
     INIT
     ============================================================ */
  renderForm();
  renderPreview();
  </script>
</body>
</html>
